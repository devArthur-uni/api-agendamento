version: "3.8"

services:
  app:
    image: php:8.4-cli
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t public

  composer:
    image: composer:latest
    container_name: composer
    working_dir: /var/www
    volumes:
      - ./src:/var/www
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: